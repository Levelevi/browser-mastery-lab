<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habit Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <h1>Habit Tracker</h1>

    <div class="add-habit">
        <input id="habitInput" type="text" placeholder="Add a habit...">
        <button id="addHabitBtn">Add</button>
    </div>

    <div class="habit-list">

        <!-- Example Habit Card -->
        <div class="habit-card">
            <span class="habit-name">Workout</span>

            <div class="habit-actions">
                <span class="streak">🔥 3</span>
                <button class="done-btn">Done</button>
                <button class="delete-btn">X</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
